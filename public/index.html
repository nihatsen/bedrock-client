<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedrock Chat</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23d4a574'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='18' fill='%231a1a1a'%3EB%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app" id="app">
  <!-- ─── SIDEBAR ─────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">B</div>
      <div>
        <div class="logo-text">Bedrock Chat</div>
        <div class="logo-sub">Amazon Bedrock</div>
      </div>
      <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>

    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <button class="sidebar-btn" onclick="openSettings()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
      <button class="sidebar-btn danger" onclick="clearAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear All
      </button>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ────────────────────────────────────────────────── -->
  <div class="main-wrap" id="mainWrap">
    <main class="main" id="mainPanel">

      <!-- Top bar -->
      <div class="topbar">
        <button class="topbar-menu-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="topbar-model">
          <select id="modelSelect" onchange="onModelChange()"></select>
        </div>

        <div class="topbar-thinking" id="thinkingToggle" onclick="toggleThinking()">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
          <span>Extended Thinking</span>
        </div>

        <div class="topbar-budget hidden" id="budgetWrap">
          <input type="range" min="1024" max="32000" step="1024" value="10240"
            id="budgetSlider" oninput="updateBudgetLabel()">
          <span class="budget-label" id="budgetLabel">10k</span>
        </div>

        <div class="topbar-spacer"></div>
        <div class="token-display" id="tokenDisplay"></div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messagesWrap">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◈</div>
          <h1 class="empty-title">Bedrock Chat</h1>
          <p class="empty-sub">Extended thinking, file uploads, image support, streaming — powered by Amazon Bedrock.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="suggest('Explain quantum entanglement simply')">Quantum entanglement</button>
            <button class="suggestion" onclick="suggest('Write a Python async web scraper')">Python async scraper</button>
            <button class="suggestion" onclick="suggest('Design a REST API for a social media app')">API design</button>
            <button class="suggestion" onclick="suggest('Write merge sort in TypeScript with comments')">Merge sort in TS</button>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-box" id="inputBox">
          <div class="file-preview-bar" id="filePreviewBar"></div>
          <div class="input-row">
            <button class="input-action-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea id="msgInput" placeholder="Reply…" rows="1"
              oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
            <button class="stop-btn" id="stopBtn" onclick="stopGeneration()" title="Stop">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <div class="input-hint">
          <span>Enter to send · Shift+Enter for newline · Paste or drag files</span>
        </div>
        <input type="file" id="fileInput" multiple style="display:none"
          accept=".pdf,.txt,.md,.csv,.json,.js,.py,.ts,.html,.css,.xml,.yaml,.yml,.sh,.rs,.go,.java,.cpp,.c,.rb,image/png,image/jpeg,image/gif,image/webp"
          onchange="handleFileSelect(event)">
      </div>

    </main>

    <!-- ─── SIDE PANEL (Code Viewer) ──────────────────────────────────── -->
    <aside class="side-panel" id="sidePanel">
      <!-- Drag to resize -->
      <div class="sp-resize-handle" id="spResizeHandle" title="Drag to resize"></div>

      <div class="side-panel-header">
        <span class="side-panel-title" id="sidePanelTitle">Code</span>
        <span class="side-panel-lang"  id="sidePanelLang">JS</span>
        <div class="side-panel-actions">
          <button class="sp-btn" id="spWrapBtn" onclick="toggleSidePanelWrap()" title="Toggle word wrap">↵ Wrap: on</button>
          <button class="sp-btn" id="spCopyBtn" onclick="copySidePanel()">Copy</button>
          <button class="sp-btn" onclick="downloadSidePanel()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="sp-btn" onclick="closeSidePanel()">✕</button>
        </div>
      </div>
      <!-- Body: table rendered by JS into spCodeWrap -->
      <div class="side-panel-body" id="sidePanelBody">
        <div id="spCodeWrap"></div>
      </div>
    </aside>
  </div>
</div>

<!-- ─── DROP OVERLAY ──────────────────────────────────────────────────── -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-zone">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="drop-title">Drop files to attach</div>
    <div class="drop-sub">Images, PDFs, code, text</div>
  </div>
</div>

<!-- ─── IMAGE VIEWER ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="imgModal" onclick="closeImgViewer()">
  <img id="imgModalImg" src="" alt="Preview">
</div>

<!-- ─── SETTINGS MODAL ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="settingsModal" onclick="handleSettingsOverlayClick(event)">
  <div class="modal settings-modal">
    <div class="modal-header">
      <span class="modal-title">⚙ Settings</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Bedrock API Key (Bearer Token)</label>
        <input type="password" class="form-input" id="settingsApiKey" placeholder="ABSK…">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>AWS Region</label>
          <select class="form-input" id="settingsRegion">
            <option value="us-east-1">us-east-1</option>
            <option value="us-west-2">us-west-2</option>
            <option value="eu-west-1">eu-west-1</option>
            <option value="ap-northeast-1">ap-northeast-1</option>
            <option value="ap-southeast-1">ap-southeast-1</option>
          </select>
        </div>
        <div class="form-group">
          <label>Max Tokens</label>
          <input type="number" class="form-input" id="settingsMaxTokens" value="16000" min="256" max="200000" step="256">
        </div>
      </div>
      <div class="form-group">
        <label>System Prompt</label>
        <textarea class="form-input form-textarea" id="settingsSystem" placeholder="You are a helpful assistant…"></textarea>
      </div>
      <div class="form-group">
        <label>Temperature <span class="hint">(non-thinking mode)</span></label>
        <div class="range-row">
          <input type="range" min="0" max="1" step="0.05" value="0.7" id="settingsTemp"
            oninput="document.getElementById('tempVal').textContent=this.value">
          <span id="tempVal">0.7</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<button class="scroll-bottom-btn" id="scrollBtn" onclick="scrollBottom()" title="Scroll to bottom">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/js/state.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/conversations.js"></script>
<script src="/js/thinking.js"></script>
<script src="/js/artifacts.js"></script>
<script src="/js/sidepanel.js"></script>
<script src="/js/messages.js"></script>
<script src="/js/stream.js"></script>
<script src="/js/input.js"></script>
<script src="/js/settings.js"></script>
<script src="/js/init.js"></script>
</body>
</html>
